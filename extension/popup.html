<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Passwords</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path
              fill="currentColor"
              d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5Zm-3 8V7a3 3 0 1 1 6 0v3H9Zm3 4a1.5 1.5 0 0 1 .75 2.8V19a.75.75 0 0 1-1.5 0v-2.2A1.5 1.5 0 0 1 12 14Z"
            />
          </svg>
        </div>
        <div class="title">Passwords</div>
      </div>
      <button id="open-options" class="icon-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path
            fill="currentColor"
            d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7.04 7.04 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.07 7.07 0 0 0 0 1.88L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54a7.04 7.04 0 0 0 1.62-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"
          />
        </svg>
      </button>
    </header>

    <div id="status-pill" class="pill pill-pending">
      <span class="dot"></span>
      <span id="status-text">Connecting</span>
    </div>

    <div id="site" class="site hidden">
      <div id="site-monogram" class="monogram">?</div>
      <div class="site-text">
        <div class="site-label">Active site</div>
        <div id="site-host" class="site-host">—</div>
      </div>
    </div>

    <div id="form" class="form hidden">
      <label class="field">
        <span class="field-label">Username</span>
        <input id="username" type="text" autocomplete="off" spellcheck="false" placeholder="Enter username or email" />
      </label>
      <p id="username-hint" class="hint hidden"></p>
    </div>

    <div id="actions" class="hidden">
      <button id="fill" class="primary">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path
            fill="currentColor"
            d="M12.65 10A6 6 0 0 0 1 12a6 6 0 0 0 11.65 2H17v4h4v-4h2v-4H12.65ZM7 14a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"
          />
        </svg>
        <span>Fill from Prime</span>
      </button>
      <button id="save" class="secondary">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path
            fill="currentColor"
            d="M5 3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.83a2 2 0 0 0-.59-1.42l-3.82-3.82A2 2 0 0 0 15.17 3H5Zm0 2h9v4a1 1 0 0 0 1 1h2v9H5V5Zm7 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"
          />
        </svg>
        <span>Save password</span>
      </button>
      <button id="generate" class="secondary">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path
            fill="currentColor"
            d="M9 4l1.2 2.8L13 8l-2.8 1.2L9 12l-1.2-2.8L5 8l2.8-1.2L9 4Zm9 6l.9 2.1 2.1.9-2.1.9-.9 2.1-.9-2.1L15 13l2.1-.9L18 10ZM6 14l.7 1.6 1.6.7-1.6.7L6 18.6l-.7-1.6L3.7 16.3l1.6-.7L6 14Zm8-7l.6 1.4 1.4.6-1.4.6L14 11l-.6-1.4L12 9l1.4-.6L14 7Z"
          />
        </svg>
        <span>Generate password</span>
      </button>
    </div>

    <div id="result" class="result hidden"></div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
