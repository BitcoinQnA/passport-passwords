appId = "0x50617373776f72647300000000000000"
icon = "resources/.foundation/icon.raw"
publisher = "Foundation Devices, Inc."
description = "Hardware-backed password manager for Passport Prime"
version = "0.1.0"

[appName]
en = "Passwords"

[permissions]
"os/fs" = [
    "AsyncCopyBlock",
    "AsyncRead",
    "AsyncWrite",
    "AtomicCopy",
    "CloseDir",
    "CloseFile",
    "CreateDirMessage",
    "Flush",
    "FlushFs",
    "GetAirlockReadAccess",
    "GetMetadata",
    "GetUsbReadAccess",
    "GetUserReadAccess",
    "MapFileMessage",
    "NextEntry",
    "OpenDirMessage",
    "OpenFileMessage",
    "ReadFile",
    "Remove",
    "Rename",
    "SeekFile",
    "SetLen",
    "SubscribeFilesystemEvent",
    "TruncateFile",
    "WriteFile",
]
"os/gui-server" = [
    "AnimateNextFrame",
    "HideKeyboard",
    "RegisterAppMessage",
    "RequestRedraw",
    "ShowModal",
    "SubmitFrame",
    "UpdateKeyboard",
]
"os/security" = ["GetAppSeed"]
"os/settings" = [
    "GetDebugTouch",
    "GetSystemTheme",
    "SubscribeDebugTouch",
    "SubscribeSystemTheme",
]
"os/usbdev" = [
    "IsDeviceEmulationEnabled",
    "ReadEndpoint",
    "RegisterCapability",
    "RegisterInterface",
    "ResetController",
    "SetEndpointStalled",
    "WaitForConnection",
    "WriteEndpoint",
]
